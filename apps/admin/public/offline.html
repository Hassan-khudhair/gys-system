<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#030d10" />
  <title>FitNex — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #030d10;
      --surface: #07151a;
      --border:  #0f2f3a;
      --primary: #00748e;
      --cyan:    #00b6cc;
      --text:    #d6eef2;
      --muted:   #5e99a8;
    }

    html, body {
      min-height: 100dvh;
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 65% 0%,   rgba(0,116,142,0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 5%  100%, rgba(0,182,204,0.07) 0%, transparent 45%);
      background-attachment: fixed;
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(1.5rem + env(safe-area-inset-top))
               calc(1.5rem + env(safe-area-inset-right))
               calc(1.5rem + env(safe-area-inset-bottom))
               calc(1.5rem + env(safe-area-inset-left));
    }

    .card {
      text-align: center;
      max-width: 320px;
      width: 100%;
    }

    .icon-wrap {
      width: 76px;
      height: 76px;
      background: rgba(0, 116, 142, 0.12);
      border: 1px solid rgba(0, 116, 142, 0.28);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.75rem;
      box-shadow: 0 0 32px rgba(0, 116, 142, 0.12);
    }

    .logo {
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      color: var(--primary);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      opacity: 0.7;
    }

    h1 {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
      line-height: 1.3;
    }

    .sub {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 0.2rem;
    }

    .hint {
      color: var(--muted);
      font-size: 0.72rem;
      margin-bottom: 2rem;
      opacity: 0.65;
      line-height: 1.6;
    }

    .btn {
      display: block;
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: opacity 0.15s;
    }

    .btn:hover  { opacity: 0.88; }
    .btn:active { opacity: 0.75; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    .footer {
      font-size: 0.65rem;
      color: var(--muted);
      opacity: 0.4;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="logo">FitNex Admin</p>

    <div class="icon-wrap">
      <!-- Wi-Fi off icon (inline SVG, no external dependency) -->
      <svg
        width="34" height="34"
        viewBox="0 0 24 24"
        fill="none"
        stroke="#00748e"
        stroke-width="1.75"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <line x1="2"  y1="2"  x2="22" y2="22"/>
        <path d="M8.5 16.5a5 5 0 0 1 7 0"/>
        <path d="M2 8.82a15 15 0 0 1 4.17-2.65"/>
        <path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/>
        <path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"/>
        <path d="M5 12.85a10 10 0 0 1 5.17-2.39"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>

    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p class="sub">No Internet Connection</p>
    <p class="hint">
      تحقق من اتصالك وحاول مرة أخرى<br/>
      Check your connection and try again
    </p>

    <button class="btn" onclick="window.location.reload()">
      إعادة المحاولة &nbsp;·&nbsp; Retry
    </button>

    <div class="divider"></div>
    <p class="footer">FitNex Gym Management</p>
  </div>
</body>
</html>
